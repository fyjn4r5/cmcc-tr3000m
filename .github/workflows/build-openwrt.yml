name: Build OpenWrt 23.05 for CMCC RAX3000M

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWrt 版本'
        required: true
        default: '23.05.5'
      profile:
        description: '设备型号'
        required: true
        default: 'cmcc_rax3000m'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OPENWRT_VERSION: ${{ github.event.inputs.version || '23.05.5' }}
  TARGET: "mediatek/filogic"
  PROFILE: ${{ github.event.inputs.profile || 'cmcc_rax3000m' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libncurses5-dev gawk zstd xz-utils

      - name: Download Image Builder
        run: |
          cd /tmp
          for ver in "${OPENWRT_VERSION}" 23.05.6 23.05.5 23.05.4; do
            for ext in tar.zst tar.xz; do
              URL="https://downloads.openwrt.org/releases/${ver}/targets/${TARGET}/openwrt-imagebuilder-${ver}-${TARGET//\//-}.Linux-x86_64.${ext}"
              if wget -q --spider "$URL" 2>/dev/null; then
                echo "Using: $URL"
                wget -q "$URL"
                FOUND_VER="$ver"
                break 2
              fi
            done
          done
          [ -z "$FOUND_VER" ] && { echo "ERROR: No OpenWrt 23.05 Image Builder found"; exit 1; }
          echo "OPENWRT_VERSION=$FOUND_VER" >> $GITHUB_ENV
          tar -xf openwrt-imagebuilder-*.tar.* -C /tmp/
          IB_DIR=$(ls -d /tmp/openwrt-imagebuilder-*/)
          echo "IB_DIR=$IB_DIR" >> $GITHUB_ENV
          echo "Image Builder directory: $IB_DIR"

      - name: List available profiles
        run: |
          cd $IB_DIR
          echo "=== Available profiles matching 'cmcc' ==="
          make info 2>/dev/null | grep -i -A 5 "cmcc" || echo "No cmcc profile found. Listing all profiles:"
          make info 2>/dev/null | head -150

      - name: Load package list
        run: |
          PACKAGES=""
          while IFS= read -r line; do
            line="${line%%#*}"
            line="${line## }"
            line="${line%% }"
            [ -z "$line" ] && continue
            PACKAGES="$PACKAGES $line"
          done < packages.txt
          echo "PACKAGES=$PACKAGES" >> $GITHUB_ENV
          echo "Packages to install: $PACKAGES"

      - name: Build firmware
        run: |
          cd $IB_DIR
          set +e
          make image \
            PROFILE="${PROFILE}" \
            FILES="${GITHUB_WORKSPACE}/files/" \
            PACKAGES="${PACKAGES}" \
            EXTRA_IMAGE_NAME="custom" \
            2>&1 | tee build.log
          result=${PIPESTATUS[0]}
          tail -20 build.log
          exit $result

      - name: List output files
        run: |
          echo "=== Build output directory ==="
          find ${IB_DIR}bin/targets -type f -ls 2>/dev/null || echo "No output files found"
          echo "=== Build log ==="
          tail -50 build.log 2>/dev/null || true

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.PROFILE }}-${{ env.OPENWRT_VERSION }}
          path: |
            ${{ env.IB_DIR }}bin/targets/**/*
            ${{ env.IB_DIR }}build.log

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.IB_DIR }}/bin/targets/**/*
          tag: ${{ github.ref_name }}
          overwrite: true
          file_glob: true
